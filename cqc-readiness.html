<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CQC Inspection Readiness — Medicus Suite</title>
    <link rel="stylesheet" href="cqc-readiness.css" />
  </head>
  <body>
    <!-- Controls (hidden when printing) -->
    <div class="cqc-controls" id="cqcControls">
      <div class="cqc-controls-row">
        <span class="cqc-controls-title">CQC Inspection Readiness</span>
        <div class="cqc-seg" id="cqcMode" role="group" aria-label="Mode">
          <button data-mode="readiness" class="active">Readiness check</button>
          <button data-mode="export">Evidence export</button>
        </div>
        <button class="cqc-btn cqc-btn-primary" id="cqcGenerate">Generate</button>
        <button class="cqc-btn" id="cqcPrint" disabled>Print / PDF</button>
        <button class="cqc-btn" id="cqcCsv" disabled>Download CSV</button>
        <button class="cqc-btn" id="cqcBaseline" disabled>Save as baseline</button>
      </div>
      <!-- Evidence-export gate (R-A): the inspector document is never auto-produced.
           Print/PDF + the export rendering stay disabled until this is ticked. -->
      <div class="cqc-gate" id="cqcGate" hidden>
        <label class="cqc-gate-label">
          <input type="checkbox" id="cqcConfirm" />
          <span>I have reviewed these figures and confirm they are accurate</span>
        </label>
      </div>
    </div>

    <main id="cqcOutput" class="cqc-output">
      <div class="cqc-empty">
        <h2>CQC Inspection Readiness</h2>
        <p>
          Choose a mode above, then press <strong>Generate</strong>. Supporting evidence for the Safe and Well-led
          processes only — never proof of compliance.
        </p>
      </div>
    </main>

    <!-- Classic scripts first: expose window.RuleCurrency + window.CqcEvidence. -->
    <script src="shared/rule-currency.js"></script>
    <script src="engine/cqc-evidence.js"></script>
    <script type="module" src="cqc-readiness.js"></script>
  </body>
</html>
