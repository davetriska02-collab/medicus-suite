<!-- Medicus Suite — Sweep reception handout (print-first page).
     Opened in a full tab by the Sweep module; reads its data from the
     transient 'sweep.handout' storage key written just before the tab opens. -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pre-clinic worklist — Medicus Suite</title>
  <style>
    /* Print-first: white paper styling on screen too, so what you see is what prints. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #fff; color: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px; line-height: 1.5;
      max-width: 800px; margin: 0 auto; padding: 28px 32px;
    }
    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
    .toolbar button {
      background: #2563eb; color: #fff; border: none; border-radius: 6px;
      padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .toolbar button:hover { opacity: 0.9; }
    .toolbar .hint { font-size: 12px; color: #555; }

    h1 { font-size: 18px; margin-bottom: 2px; }
    .meta { font-size: 12px; color: #444; margin-bottom: 4px; }
    .confidential {
      border: 2px solid #b91c1c; color: #b91c1c; border-radius: 6px;
      padding: 6px 10px; font-size: 11px; font-weight: 700;
      margin: 12px 0 18px; text-transform: uppercase; letter-spacing: 0.04em;
    }

    .patient {
      border: 1px solid #bbb; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 10px;
      page-break-inside: avoid;
    }
    .patient-head { display: flex; gap: 10px; align-items: baseline; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-bottom: 7px; }
    .patient-time { font-weight: 700; font-variant-numeric: tabular-nums; }
    .patient-name { font-weight: 700; font-size: 14px; flex: 1; }
    .patient-clin { font-size: 12px; color: #444; }
    .action { display: flex; gap: 9px; align-items: baseline; padding: 3px 0; }
    .action .box { font-size: 15px; line-height: 1; }
    .action .what { font-weight: 600; }
    .action .why { color: #555; font-size: 12px; }
    .hidden-note { font-size: 11px; color: #92400e; margin-top: 5px; }

    .footer {
      margin-top: 22px; padding-top: 10px; border-top: 1px solid #bbb;
      font-size: 11px; color: #555; line-height: 1.6;
    }
    .empty { padding: 40px 0; color: #555; font-size: 14px; }

    @media print {
      .no-print { display: none !important; }
      body { padding: 0; }
    }
  </style>
</head>
<body>
  <div class="toolbar no-print">
    <button id="printBtn" type="button">Print / save as PDF</button>
    <span class="hint">Tip: in the print window choose "Save as PDF" to keep a file instead of printing.</span>
  </div>
  <div id="content"><div class="empty">Loading worklist&hellip;</div></div>
  <script src="handout.js"></script>
</body>
</html>
