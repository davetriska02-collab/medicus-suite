<!-- Medicus Suite — Sweep batch output (print-first page).
     Opened in a full tab by the Sweep module when the user clicks "Generate batch"
     after selecting multiple worklist rows. Reads its data from the transient
     'sweep.batchPack' storage key written just before the tab opens.

     PHI discipline: data consumed-on-read (key removed after render); nothing
     new is persisted to chrome.storage; nothing leaves the browser. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Batch output — Medicus Suite</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #fff;
        color: #111;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        line-height: 1.5;
        max-width: 860px;
        margin: 0 auto;
        padding: 28px 32px;
      }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .toolbar button {
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .toolbar button:hover {
        opacity: 0.9;
      }
      .toolbar .hint {
        font-size: 12px;
        color: #555;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 2px;
      }
      .meta {
        font-size: 12px;
        color: #444;
        margin-bottom: 4px;
      }
      .confidential {
        border: 2px solid #b91c1c;
        color: #b91c1c;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 11px;
        font-weight: 700;
        margin: 12px 0 18px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* Per-patient card */
      .patient {
        border: 1px solid #bbb;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 14px;
        page-break-inside: avoid;
      }
      .patient-head {
        display: flex;
        gap: 10px;
        align-items: baseline;
        border-bottom: 1px solid #ddd;
        padding-bottom: 5px;
        margin-bottom: 8px;
      }
      .patient-time {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .patient-name {
        font-weight: 700;
        font-size: 14px;
        flex: 1;
      }
      .patient-badges {
        display: flex;
        gap: 5px;
        align-items: baseline;
      }
      .badge-red {
        background: rgba(220, 38, 38, 0.08);
        color: #dc2626;
        border: 1px solid rgba(220, 38, 38, 0.3);
        border-radius: 4px;
        font-size: 11px;
        font-weight: 700;
        padding: 1px 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge-amber {
        background: rgba(180, 83, 9, 0.09);
        color: #b45309;
        border: 1px solid rgba(180, 83, 9, 0.32);
        border-radius: 4px;
        font-size: 11px;
        font-weight: 700;
        padding: 1px 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* Sections within each patient card */
      .section-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #555;
        margin: 8px 0 4px;
      }
      .section-label:first-of-type {
        margin-top: 0;
      }

      /* Blood form */
      .blood-form {
        background: #f0f7ff;
        border: 1px solid #bcd3f5;
        border-radius: 6px;
        padding: 7px 10px;
        font-family: monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #1a3c6b;
      }

      /* SMS block */
      .sms-wrap {
        position: relative;
      }
      .sms-text {
        background: #f7fdf0;
        border: 1px solid #b4d89a;
        border-radius: 6px;
        padding: 7px 10px 7px 10px;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #1a4010;
      }
      .copy-btn {
        position: absolute;
        top: 5px;
        right: 6px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
      }
      .copy-btn:hover {
        opacity: 0.9;
      }
      .copy-btn.copied {
        background: #16a34a;
      }

      /* SMS consolidated list (all patients together) */
      .sms-all-section {
        margin-top: 24px;
        border-top: 2px solid #ddd;
        padding-top: 16px;
      }
      .sms-all-section h2 {
        font-size: 15px;
        margin-bottom: 4px;
      }
      .sms-all-section .hint {
        font-size: 12px;
        color: #555;
        margin-bottom: 10px;
      }
      .sms-all-block {
        background: #fafafa;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 10px 12px;
        font-family: monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #111;
      }
      .sms-all-wrap {
        position: relative;
      }

      .footer {
        margin-top: 22px;
        padding-top: 10px;
        border-top: 1px solid #bbb;
        font-size: 11px;
        color: #555;
        line-height: 1.6;
      }
      .empty {
        padding: 40px 0;
        color: #555;
        font-size: 14px;
      }

      @media print {
        .no-print {
          display: none !important;
        }
        body {
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar no-print">
      <button id="printBtn" type="button">Print / save as PDF</button>
      <span class="hint"
        >The consolidated SMS list at the bottom is ready to copy and paste into Medicus batch messaging.</span
      >
    </div>
    <div id="content"><div class="empty">Loading batch output&hellip;</div></div>
    <script src="batch-handout.js"></script>
  </body>
</html>
