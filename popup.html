<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Waiting Room</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --bg-elev:   #161b24;
      --bg-mid:    #1e2530;
      --border:    rgba(255,255,255,0.07);
      --border-hi: rgba(255,255,255,0.13);
      --text-1: #f0f4f8;
      --text-2: #c8d3dd;
      --text-3: #8a9bb0;
      --text-4: #5a6a7e;
      --accent:  #3b82f6;
      --red:     #f87171;
      --amber:   #fbbf24;
      --green:   #4ade80;
      --sans:    -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono:    'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--sans);
      font-size: 13px;
      min-height: 80px;
    }

    .wr-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
    }

    .wr-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      font-family: var(--mono);
    }

    .wr-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .wr-refresh-btn {
      background: none;
      border: none;
      color: var(--text-4);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.1s;
    }
    .wr-refresh-btn:hover { color: var(--text-2); }
    .wr-refresh-btn.spinning { animation: spin 0.7s linear infinite; }

    .wr-open-btn {
      font-size: 10px;
      font-family: var(--mono);
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent);
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 5px;
      padding: 3px 8px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .wr-open-btn:hover { background: rgba(59,130,246,0.22); }

    .wr-body { padding: 0; }

    /* Empty / error state */
    .wr-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 18px 12px;
      color: var(--text-4);
      font-size: 12px;
      text-align: center;
    }
    .wr-state-icon { font-size: 20px; opacity: 0.5; }

    /* Hero count */
    .wr-hero {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
    }
    .wr-hero-count {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--amber);
      line-height: 1;
      min-width: 40px;
    }
    .wr-hero-count.none { color: var(--green); font-size: 28px; }
    .wr-hero-label {
      font-size: 12px;
      color: var(--text-3);
      line-height: 1.4;
    }
    .wr-hero-label strong { color: var(--text-2); font-weight: 600; }

    /* Patient list */
    .wr-list { display: flex; flex-direction: column; }

    .wr-patient {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .wr-patient:last-child { border-bottom: none; }
    .wr-patient:hover { background: var(--bg-elev); }

    .wr-patient-time {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-4);
      white-space: nowrap;
      padding-top: 2px;
      min-width: 32px;
    }

    .wr-patient-info { flex: 1; min-width: 0; }

    .wr-patient-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .wr-patient-meta {
      font-size: 10px;
      color: var(--text-4);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: var(--mono);
    }

    .wr-wait-badge {
      font-size: 9px;
      font-family: var(--mono);
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .wr-wait-ok     { background: rgba(74,222,128,0.12); color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
    .wr-wait-amber  { background: rgba(251,191,36,0.15); color: var(--amber); border: 1px solid rgba(251,191,36,0.3); }
    .wr-wait-red    { background: rgba(248,113,113,0.15); color: var(--red);   border: 1px solid rgba(248,113,113,0.3); }

    /* Footer */
    .wr-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      border-top: 1px solid var(--border);
      background: var(--bg-elev);
    }
    .wr-ts {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--text-4);
      letter-spacing: 0.04em;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
    .wr-skel { height: 52px; background: var(--bg-elev); border-bottom: 1px solid var(--border); animation: pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="wr-header">
    <span class="wr-title">Waiting Room</span>
    <div class="wr-actions">
      <button class="wr-refresh-btn" id="refreshBtn" title="Refresh">↻</button>
      <button class="wr-open-btn" id="openSuiteBtn">Open Suite</button>
    </div>
  </div>
  <div class="wr-body" id="wrBody">
    <div class="wr-skel"></div>
    <div class="wr-skel" style="opacity:0.6"></div>
  </div>
  <div class="wr-footer">
    <span class="wr-ts" id="wrTs">Loading…</span>
  </div>
  <script src="shared/practice-code.js"></script>
  <script src="shared/api-diag.js"></script>
  <script src="popup.js"></script>
</body>
</html>
