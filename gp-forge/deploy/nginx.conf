# GP Forge edge — TLS termination (internal CA) + concurrency cap + streaming-safe proxying.
events {}
http {
  # Concurrency cap per client IP — protects the single GPU from a spike (admission control).
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  upstream gp_forge { server gp-forge:8089; }

  server {
    listen 443 ssl;
    server_name ai.surgery.local;

    ssl_certificate     /etc/nginx/tls/server.crt; # provide via internal CA
    ssl_certificate_key /etc/nginx/tls/server.key;

    limit_conn perip 8;

    location / {
      proxy_pass http://gp_forge;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      # Streaming-safe: nginx buffers by default, which breaks token streaming (SSE). Turn it off
      # and give long-lived requests room. (The #1 nginx-in-front-of-an-LLM gotcha.)
      proxy_buffering off;
      proxy_http_version 1.1;
      proxy_read_timeout 3600s;
      gzip off;
    }
  }
}
