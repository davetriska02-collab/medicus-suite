<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patient Record Visualiser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #f0f4f5; }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <!-- visualiser-core.html runs in a sandbox page (relaxed CSP) so that
       PDF.js's bundled eval() / new Function() / blob workers can execute. -->
  <iframe src="visualiser-core.html"
          sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-downloads allow-modals allow-pointer-lock">
  </iframe>
</body>
</html>
