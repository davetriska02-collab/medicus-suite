name: Tests

# Runs the full automated test suite on every push and pull request, and fails
# closed on any failure. This is the "release gating" control referenced in
# docs/CLINICAL-SAFETY-NOTICE.md (§11) and docs/HAZARD-LOG.md (H-006).

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # Full history so the patient-data guard can diff against the base branch.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard against committed patient data (forbidden paths + NHS numbers)
        run: node scripts/check-no-patient-data.js

      - name: Verify Triage Lens defaults are in sync (3-copy guard)
        run: node scripts/regen-defaults.js --check

      - name: Verify shipped-config changes bump defaults.json "version" (migration guard)
        run: node scripts/defaults-config-lock.js --check

      - name: Verify safety-doc versions track manifest (known-stale pins allowed)
        run: node scripts/check-doc-versions.js

      - name: Verify vendored library integrity (sha256 vs vendor-versions.json)
        run: node scripts/verify-vendor.js

      - name: Syntax-check shipped JS entry points
        run: |
          node --check content-scripts/triage-lens/content.js
          node --check content-scripts/sentinel.js
          node --check engine/rules-engine.js
          node --check sentinel-options/options.js
          node --check service-worker.js
          node --check options/options.js
          node --check visualiser-core.js

      - name: Run automated test suite (fails closed)
        run: node --test --test-concurrency=1 test-*.js

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: ESLint (lenient config, repo-wide, fails closed)
        run: npx eslint .

  visualiser:
    # Headless render gate for the patient-record visualiser. Loads the page
    # under a faithful emulation of the MV3 extension-page CSP (script-src 'self')
    # and asserts PDF.js loads, the drop-zone/file-input is wired, and a PDF
    # parses end-to-end. This closes the gap that let the v3.92.1 CSP regression
    # (inline <script type=module> blocked → dead button) ship un-caught.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Install Playwright browser binaries
        run: npx playwright install --with-deps chromium
      - name: Verify visualiser loads + parses a PDF under the MV3 CSP (headless, fails closed)
        run: node scripts/verify-visualiser.mjs

