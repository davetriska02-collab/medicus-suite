name: Tests

# Runs the full automated test suite on every push and pull request, and fails
# closed on any failure. This is the "release gating" control referenced in
# docs/CLINICAL-SAFETY-NOTICE.md (§11) and docs/HAZARD-LOG.md (H-006).

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Triage Lens defaults are in sync (3-copy guard)
        run: node scripts/regen-defaults.js --check

      - name: Verify vendored library integrity (sha256 vs vendor-versions.json)
        run: node scripts/verify-vendor.js

      - name: Syntax-check changed JS entry points
        run: |
          node --check content-scripts/triage-lens/content.js
          node --check content-scripts/sentinel.js
          node --check engine/rules-engine.js
          node --check sentinel-options/options.js

      - name: Run automated test suite (fails closed)
        run: |
          fail=0
          for t in test-*.js; do
            echo "── $t"
            node "$t" || fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more test files failed."
            exit 1
          fi
