name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Derive version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          MANIFEST_VERSION="${{ steps.version.outputs.version }}"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Check if release already exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          echo "release_exists=$([ "$STATUS" = '200' ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        if: steps.check.outputs.release_exists == 'false'
        run: |
          mkdir -p _build/medicus-suite-v${{ steps.version.outputs.version }}
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='_build/' \
            --exclude='test-*.js' \
            --exclude='scripts/' \
            --exclude='.claude/' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            ./ _build/medicus-suite-v${{ steps.version.outputs.version }}/
          cd _build
          zip -r ../medicus-suite-v${{ steps.version.outputs.version }}.zip medicus-suite-v${{ steps.version.outputs.version }}/

      - name: Create GitHub release
        if: steps.check.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Medicus Suite ${{ steps.version.outputs.tag }}
          body: |
            Medicus Suite ${{ steps.version.outputs.tag }}.

            Download `medicus-suite-v${{ steps.version.outputs.version }}.zip` below.
            Installation steps are in the [README](https://github.com/davetriska02-collab/medicus-suite/blob/main/README.md).
          files: medicus-suite-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
