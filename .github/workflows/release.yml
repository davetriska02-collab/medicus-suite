name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Derive version from manifest
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify manifest version matches tag (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          MANIFEST_VERSION="${{ steps.version.outputs.version }}"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::manifest.json version ($MANIFEST_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Check if release already exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          echo "release_exists=$([ "$STATUS" = '200' ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

      - name: Build extension zip
        if: steps.check.outputs.release_exists == 'false'
        run: |
          mkdir -p _build/medicus-suite-v${{ steps.version.outputs.version }}
          rsync -av \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='_build/' \
            --exclude='test-*.js' \
            --exclude='scripts/' \
            --exclude='.claude/' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='node_modules/' \
            --exclude='eslint.config.mjs' \
            --exclude='.prettierrc.json' \
            --exclude='.prettierignore' \
            --exclude='.githooks/' \
            ./ _build/medicus-suite-v${{ steps.version.outputs.version }}/
          cd _build
          zip -r ../medicus-suite-v${{ steps.version.outputs.version }}.zip medicus-suite-v${{ steps.version.outputs.version }}/

      - name: Generate SHA-256 checksum
        if: steps.check.outputs.release_exists == 'false'
        run: |
          sha256sum "medicus-suite-v${{ steps.version.outputs.version }}.zip" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Build release notes from CHANGELOG
        if: steps.check.outputs.release_exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md (everything
          # between this version's "## [vX.Y.Z]" header and the next "## [v" header).
          awk -v ver="## [v${VERSION}]" '
            index($0, ver) == 1 { grab = 1; next }
            grab && /^## \[v/ { exit }
            grab { print }
          ' CHANGELOG.md > _section.md
          {
            if [ -s _section.md ]; then
              sed -e '1{/^$/d}' _section.md
            else
              echo "Maintenance release. See CHANGELOG.md for details."
            fi
            echo
            echo "---"
            echo
            echo "### Install (unpacked — Chrome / Edge)"
            echo "1. Download \`medicus-suite-v${VERSION}.zip\` below and unzip it."
            echo "2. Open \`chrome://extensions\` and enable **Developer mode** (top-right)."
            echo "3. Click **Load unpacked** and select the unzipped \`medicus-suite-v${VERSION}\` folder."
            echo "4. Pin the extension and open the side panel. Full steps: [README](https://github.com/${{ github.repository }}/blob/main/README.md)."
            echo
            echo "### Verify your download"
            echo "Download \`SHA256SUMS.txt\` alongside the zip, then:"
            echo '```'
            echo "sha256sum -c SHA256SUMS.txt"
            echo '```'
          } > RELEASE_NOTES.md
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub release
        if: steps.check.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Medicus Suite ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            medicus-suite-v${{ steps.version.outputs.version }}.zip
            SHA256SUMS.txt
          draft: false
          prerelease: false
